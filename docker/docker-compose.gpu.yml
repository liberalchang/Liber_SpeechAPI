services:
  liber-speech:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: liber-speech:gpu
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    environment:
      LIBER_DEVICE: cuda
      LIBER_API_HOST: 0.0.0.0
      LIBER_API_PORT: 5555
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../results:/app/results
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache:
