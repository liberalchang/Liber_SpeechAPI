services:
  liber-speech:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: liber-speech:cpu
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    environment:
      LIBER_API_HOST: 0.0.0.0
      LIBER_API_PORT: 5555
    volumes:
      - ../results:/app/results
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  hf-cache:
